name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    name: Build And Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Build And Deploy
  uses: Azure/static-web-apps-deploy@v1
  with:
    azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    repo_token: ${{ secrets.GITHUB_TOKEN }}
    action: "upload"

    # --- Make the paths explicit for a static site in repo root ---
    app_location: "."          # repo root (where index.html lives)
    output_location: "."       # tell the action that artifacts live in the same root
    api_location: ""           # no API
    skip_app_build: "true"     # force deploy-as-is (quote it so the input is read)
